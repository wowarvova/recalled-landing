<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Recalled App — Jetzt im App Store." />
    <title>Recalled</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="config.js" defer></script>
  </head>
  <body>
    <main class="page">
      <a id="app-store-link" class="download-row" href="#" aria-label="Jetzt zum App Store">
        <span class="app-store-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false">
            <path
              d="M16.365 1.43c0 1.14-.417 2.064-1.249 2.77-.94.81-2.088 1.215-3.116 1.143-.147-1.098.48-2.247 1.386-3.01.897-.756 2.214-1.32 3.214-1.503.003.2.765.4.765.6zm3.44 17.01c-.807 1.17-1.77 2.34-3.186 2.34-1.2 0-1.56-.78-2.91-.78-1.38 0-1.8.75-2.94.81-1.17.06-2.07-1.2-2.88-2.37-1.56-2.26-2.76-6.4-1.17-9.2.78-1.38 2.19-2.25 3.72-2.28 1.16-.02 2.25.81 2.91.81.66 0 2.13-.99 3.6-.84.61.03 2.34.25 3.45 1.86-.09.06-2.06 1.2-2.04 3.57.03 2.85 2.49 3.81 2.52 3.82-.02.06-.39 1.35-1.29 2.67z"
            />
          </svg>
        </span>
        <span class="download-btn">Jetzt zum App Store</span>
      </a>
      <p class="setup-hint" id="setup-hint" hidden>
        App-Store-Link in <code>config.js</code> eintragen.
      </p>
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const url = ((window.RECALLED_APP || {}).appStoreUrl || "").trim();
        const link = document.getElementById("app-store-link");
        const hint = document.getElementById("setup-hint");

        if (url && url !== "#") {
          link.href = url;
          link.rel = "noopener noreferrer";
          link.target = "_blank";
        } else {
          link.addEventListener("click", (event) => event.preventDefault());
          hint.hidden = false;
        }
      });
    </script>
  </body>
</html>
